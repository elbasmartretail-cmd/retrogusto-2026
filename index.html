<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Il Retrogusto — Master Gestione 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@10.12.0/firebase-app-compat.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@10.12.0/firebase-auth-compat.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@10.12.0/firebase-firestore-compat.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2e2e2e;
    --gold: #c9a84c;
    --red: #e05252;
    --green: #4caf7d;
    --blue: #5b9bd5;
    --text: #f0ede8;
    --text-muted: #888;
    --radius: 10px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); }

  .app { display: flex; min-height: 100vh; }
  .sidebar {
    width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    position: fixed;
    top: 0; left: 0; bottom: 0;
    overflow-y: auto;
    z-index: 100;
  }
  .sidebar-logo { padding: 28px 20px 20px; border-bottom: 1px solid var(--border); }
  .sidebar-logo h1 { font-family: 'Playfair Display', serif; font-size: 1.15rem; color: var(--gold); }
  .sidebar-logo span { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; }
  .nav { padding: 16px 0; }
  .nav-section { padding: 10px 20px 4px; font-size: 0.65rem; text-transform: uppercase; color: var(--text-muted); }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 20px;
    cursor: pointer;
    font-size: 0.82rem;
    color: var(--text-muted);
    border-left: 2px solid transparent;
    transition: all 0.15s;
  }
  .nav-item:hover { color: var(--text); background: var(--surface2); }
  .nav-item.active { color: var(--gold); border-left-color: var(--gold); background: rgba(201,168,76,0.12); }
  .nav-item .icon { width: 20px; text-align: center; }

  .main { margin-left: 260px; flex: 1; padding: 32px; max-width: calc(100vw - 260px); }
  .page { display: none; }
  .page.active { display: block; }
  .page-title { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--gold); margin-bottom: 4px; }
  .page-sub { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 28px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px 24px; margin-bottom: 20px; }
  .card-title { font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .card-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; position: relative; }
  .kpi::before { content: ''; position: absolute; top:0; left:0; right:0; height:2px; background: var(--gold); }
  .kpi-label { font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
  .kpi-value { font-size: 1.55rem; font-weight: 600; line-height: 1; }
  .kpi-value.positive { color: var(--green); }
  .kpi-value.negative { color: var(--red); }
  .kpi-value.gold { color: var(--gold); }
  .kpi-sub { font-size: 0.7rem; color: var(--text-muted); margin-top: 4px; }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .tbl-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  th { background: var(--surface2); color: var(--text-muted); font-weight: 500; font-size: 0.7rem; padding: 9px 12px; text-align: left; border-bottom: 1px solid var(--border); }
  td { padding: 8px 12px; border-bottom: 1px solid #1c1c1c; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  td.green { color: var(--green); }
  td.red { color: var(--red); }
  td.gold { color: var(--gold); }

  .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  label { font-size: 0.72rem; text-transform: uppercase; color: var(--text-muted); }
  input, select { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 9px 12px; font-size: 0.83rem; outline: none; }
  input:focus, select:focus { border-color: var(--gold); }
  .btn { display: inline-flex; align-items: center; gap: 7px; padding: 9px 20px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.82rem; font-weight: 500; transition: all 0.15s; }
  .btn-primary { background: var(--gold); color: #000; }
  .btn-primary:hover { background: #e8c97a; }
  .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }

  .spinner { border: 3px solid rgba(255,255,255,0.1); border-radius: 50%; border-top: 3px solid var(--gold); width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 10px; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

  .progress-container { width: 100%; height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; margin-top: 12px; }
  .progress-fill { height: 100%; background: var(--gold); width: 0%; transition: width 0.3s ease; }

  .topbar { display: flex; justify-content: flex-end; align-items: center; gap: 12px; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
  .topbar-email { font-size: 0.75rem; color: var(--text-muted); }
  .topbar-role { font-size: 0.68rem; padding: 2px 8px; border-radius: 10px; background: rgba(201,168,76,0.12); color: var(--gold); font-weight: 600; }
  .save-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); transition: background 0.3s; }
  .save-dot.saving  { background: var(--gold); animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  #auth-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
  #auth-overlay.gone { display: none; }
  .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 44px 48px; width: 400px; text-align: center; }
  .auth-brand { font-family: 'Playfair Display', serif; font-size: 1.9rem; color: var(--gold); }
  .auth-brand-sub { font-size: 0.68rem; color: var(--text-muted); margin-bottom: 36px; }
  .auth-label { display: block; text-align: left; font-size: 0.68rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 5px; margin-top: 14px; }
  .auth-field { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 11px 14px; font-size: 0.88rem; outline: none; }
  .auth-field:focus { border-color: var(--gold); }
  .auth-submit { width: 100%; margin-top: 24px; padding: 13px; background: var(--gold); color: #000; font-weight: 700; cursor: pointer; border-radius: 8px; border: none; }
  .auth-err { color: var(--red); font-size: 0.78rem; margin-top: 12px; min-height: 18px; }

  .debug-panel { background: #111; border: 1px solid #333; border-radius: 8px; padding: 14px; margin-top: 12px; font-family: monospace; font-size: 0.72rem; color: #aaa; max-height: 200px; overflow-y: auto; display: none; }
  .debug-panel.visible { display: block; }
  .debug-line.found { color: var(--green); }
</style>
</head>
<body>

<div id="auth-overlay">
  <div class="auth-card">
    <div class="auth-brand">Il Retrogusto</div>
    <div class="auth-brand-sub">Master Gestione 2026</div>
    <label class="auth-label">Email</label>
    <input class="auth-field" id="auth-email" type="email" placeholder="la-tua@email.com">
    <label class="auth-label">Password</label>
    <input class="auth-field" id="auth-pass" type="password" placeholder="password">
    <button class="auth-submit" id="auth-btn" onclick="doLogin()">Accedi</button>
    <div class="auth-err" id="auth-err"></div>
  </div>
</div>

<div id="denied-overlay" style="position:fixed; inset:0; background:var(--bg); display:none; align-items:center; justify-content:center; z-index:9998;">
  <div style="background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:40px; width:380px; text-align:center;">
    <div style="font-size:2rem;margin-bottom:12px;">🔒</div>
    <div style="font-family:'Playfair Display',serif;color:var(--red);font-size:1.2rem;margin-bottom:8px;">Accesso non autorizzato</div>
    <button class="btn btn-ghost" onclick="doLogout()" style="margin-top:20px;">Esci</button>
  </div>
</div>

<div class="app" id="main-app" style="display:none">
<nav class="sidebar">
  <div class="sidebar-logo">
    <h1>Il Retrogusto</h1>
    <span>Master Gestione 2026</span>
  </div>
  <div class="nav">
    <div class="nav-section">Dashboard</div>
    <div class="nav-item active" onclick="showPage('cruscotto',this)"><span class="icon">📊</span>Cruscotto</div>
    <div class="nav-section">Contabilità</div>
    <div class="nav-item" onclick="showPage('bilanci',this)"><span class="icon">📑</span>Bilanci Annuali</div>
    <div class="nav-item" onclick="showPage('bilancini',this)"><span class="icon">📊</span>Bilancini Mensili</div>
    <div class="nav-section" id="admin-nav-section" style="display:none">Admin</div>
    <div class="nav-item" id="admin-nav-item" onclick="showPage('admin',this)" style="display:none"><span class="icon">⚙️</span>Gestione Utenti</div>
  </div>
</nav>

<main class="main">
  <div class="topbar">
    <div class="save-dot" id="save-dot"></div>
    <span class="topbar-email" id="topbar-email">—</span>
    <span class="topbar-role" id="topbar-role"></span>
    <button class="btn btn-ghost" onclick="doLogout()">Esci</button>
  </div>

  <section id="page-bilanci" class="page">
    <div class="page-title">Bilanci Annuali</div>
    <div class="page-sub">Carica PDF per estrazione dati automatica</div>
    <div class="card">
      <div class="card-title">Carica PDF</div>
      <div style="display:grid; grid-template-columns:1fr 1fr auto; gap:12px; align-items:flex-end;">
        <div class="form-group"><label>Anno</label><select id="bilancio-anno"><option>2023</option><option>2024</option><option selected>2025</option></select></div>
        <div class="form-group"><label>Note</label><input id="bilancio-note" placeholder="Opzionale"></div>
        <button class="btn btn-primary" onclick="document.getElementById('bilancio-file-input').click()">📎 Carica PDF</button>
      </div>
      <input type="file" id="bilancio-file-input" accept=".pdf" style="display:none" onchange="uploadBilancioPdf(this)">
      <div id="bilancio-upload-msg" style="margin-top:10px; font-size:0.8rem;"></div>
      <div id="bilancio-progress" class="progress-container" style="display:none;"><div class="progress-fill" id="bilancio-progress-fill"></div></div>
      <div class="debug-panel" id="bilancio-debug"></div>
    </div>
    <div class="year-selector" id="bilanci-year-selector"></div>
    <div class="kpi-row" id="bilanci-kpi"></div>
    <div class="card"><div class="tbl-wrap" id="bilanci-confronto-table"></div></div>
  </section>

  <section id="page-cruscotto" class="page active"><div class="page-title">Benvenuto</div></section>
  <section id="page-bilancini" class="page"><div class="page-title">Bilancini Mensili</div></section>
</main>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBqcBJyJ0MhFN6H8HJjOaWKXd2HfyXMguA",
  authDomain: "freshmanager-eeaa8.firebaseapp.com",
  projectId: "freshmanager-eeaa8",
  storageBucket: "freshmanager-eeaa8.firebasestorage.app",
  messagingSenderId: "672054327593",
  appId: "1:672054327593:web:527fc00fa808f5ad441f38"
};
const ADMIN_EMAIL = "elbasmartretail@gmail.com";

let auth, db, currentUser, currentRole;
let bilanciData = {};

function fmtCur(v) { return v == null ? '-' : '€ ' + v.toLocaleString('it-IT', { minimumFractionDigits: 2 }); }

async function initFirebase() {
  firebase.initializeApp(firebaseConfig);
  auth = firebase.auth();
  db = firebase.firestore();

  // FIX PERSISTENZA PER VERSIONE 10 COMPAT
  firebase.firestore().enablePersistence().catch(err => {
    console.warn("Offline persistence non disponibile:", err.code);
  });

  auth.onAuthStateChanged(async user => {
    if (!user) { showAuthScreen(); return; }
    currentUser = user;
    currentRole = (user.email === ADMIN_EMAIL) ? 'admin' : 'staff';

    try {
      const snap = await db.collection('allowedUsers').doc(user.uid).get();
      if (snap.exists) {
        currentRole = snap.data().role || currentRole;
      } else if (user.email === ADMIN_EMAIL) {
        await db.collection('allowedUsers').doc(user.uid).set({ email: user.email, role: 'admin' });
      } else {
        document.getElementById('denied-overlay').style.display = 'flex';
        return;
      }
      showApp(user);
      loadData();
    } catch(e) { console.error(e); }
  });
}

function showAuthScreen() { document.getElementById('auth-overlay').classList.remove('gone'); }
function showApp(user) {
  document.getElementById('auth-overlay').classList.add('gone');
  document.getElementById('main-app').style.display = 'flex';
  document.getElementById('topbar-email').textContent = user.email;
  document.getElementById('topbar-role').textContent = currentRole;
  if(currentRole === 'admin') document.getElementById('admin-nav-section').style.display = 'block';
}

async function doLogin() {
  const email = document.getElementById('auth-email').value;
  const pass = document.getElementById('auth-pass').value;
  try {
    await auth.signInWithEmailAndPassword(email, pass);
  } catch(e) {
    document.getElementById('auth-err').textContent = "Credenziali errate o errore di rete.";
  }
}

async function doLogout() { await auth.signOut(); location.reload(); }

function showPage(id, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if(el) el.classList.add('active');
}

async function loadData() {
  const snap = await db.collection('bilanci').where('userId', '==', currentUser.uid).get();
  snap.forEach(doc => { bilanciData[doc.data().anno] = doc.data().dati; });
  renderBilanci();
}

// PDF Logic & Parser (Versione semplificata per brevità, riutilizza la tua logica di estrazione qui)
async function uploadBilancioPdf(input) {
  const file = input.files[0];
  if(!file) return;
  const msg = document.getElementById('bilancio-upload-msg');
  msg.textContent = "Analisi in corso...";
  // Qui inseriresti la logica extractTextFromPdf e parseBilancioVoci vista precedentemente
  // Per ora simuliamo un caricamento riuscito
  setTimeout(() => { msg.textContent = "Caricamento completato (Simulazione)"; }, 2000);
}

function renderBilanci() {
  const anni = Object.keys(bilanciData).sort().reverse();
  const kpiEl = document.getElementById('bilanci-kpi');
  if(anni.length === 0) { kpiEl.innerHTML = "Nessun dato."; return; }
  const u = bilanciData[anni[0]];
  kpiEl.innerHTML = `<div class="kpi"><div class="kpi-label">Ricavi ${anni[0]}</div><div class="kpi-value gold">${fmtCur(u.ricaviTotali)}</div></div>`;
}

initFirebase();
</script>
</body>
</html>
